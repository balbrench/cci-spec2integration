openapi: 3.1.0
info:
  title: <Integration Name> HTTP API
  version: 0.1.0
  description: Synchronous HTTP surfaces exposed or consumed by this integration.
  contact:
    name: Spec2Integration
    email: architecture@example.com
tags:
  - name: Default
    description: Default tag placeholder until operation-specific tags are generated.
servers:
  - url: https://{host}/{basePath}
    variables:
      host:
        default: localhost
      basePath:
        default: api
paths:
  /<resource>:
    post:
      operationId: create<Resource>
      summary: <description>
      tags:
        - Default
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/<Resource>.json#'
      responses:
        '202':
          description: Accepted
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '500':
          description: Internal error
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
