# Greenfield IR template.
# For migration scenarios (BizTalk, MuleSoft, TIBCO, etc.) set metadata.scenario: migration
# and add the `source:` block. See the commented MIGRATION EXAMPLE at the bottom of this file.
apiVersion: spec2integration/v1
kind: Integration
metadata:
  name: <kebab-case-name>
  domain: <business-domain>
  owner: <team>
  description: <one-liner>
  scenario: greenfield          # greenfield | migration
  # sourcePlatform: greenfield  # set when scenario: migration — biztalk | mulesoft | tibco | boomi | informatica | ssis

channels:
  - name: <name-kind>
    kind: http   # http | queue | topic | blob | timer | eventgrid
    direction: inbound
    auth: managedIdentity
    schemaRef: <MessageName>
    # Messaging semantics (Phase 6). Omit any that are not yet decided; defaults apply.
    delivery: at-least-once        # at-most-once | at-least-once | exactly-once
    ordering: none                 # none | fifo | byKey (requires orderingKey)
    # orderingKey: body.<id>       # required when ordering: byKey
    # sessionKey: <key>            # alias for session-aware brokers
    # ack: peekLock                # auto | peekLock | manual   (queue/topic only)
    # concurrency: { prefetch: 32, maxConcurrent: 8 }   # inbound queue/topic only
    # maxDeliveryCount: 5
    # ttl: P7D
    # retention: P30D              # Article V retention hook
    classification: internal       # public | internal | confidential | restricted

messages:
  - name: <MessageName>
    schemaRef: contracts/schemas/<MessageName>.json
    contentType: application/json
    format: json                 # json | xml | csv | edi-x12 | edifact | avro | protobuf | flat-file | text | binary
    encoding: utf-8
    schemaLanguage: json-schema
    idempotencyKey: <id>         # required on inbound external messages (Article III)
    correlationId: X-Correlation-Id
    version: 1.0.0
    compatibility: backward      # backward | forward | full | none
    classification: internal
    # pii: true
    headers:
      - name: correlationId
        type: uuid
        required: true
        source: generated        # literal | body | requestHeader | context | generated
    examples:
      - name: <example-name>
        path: contracts/examples/<MessageName>.example.json

mappings:
  - name: <SourceName>To<TargetName>
    description: <one-liner>
    source: { messageRef: <SourceName> }
    target: { messageRef: <TargetName> }
    engine: jsonata              # default; jslt | xslt | liquid | expression for specialised cases
    rules:
      - target: <targetField>
        source: <sourceField>
      - target: <computedField>
        expression: "$uuid()"
    tests:
      - name: happy-path
        input:  { path: contracts/examples/<SourceName>.example.json }
        expect: { path: contracts/examples/<TargetName>.example.json }

endpoints:
  - name: <EndpointName>
    channel: <channel-name>
    operation: request
    contractRef: contracts/openapi.yaml

flows:
  - name: <FlowName>Flow
    stateful: true
    trigger: <inbound-channel-name>
    steps:
      - id: receive
        type: receive
        channel: <inbound-channel-name>
        next: transform
      - id: transform
        type: transform
        mappingRef: <SourceName>To<TargetName>
        next: send
      - id: send
        type: send
        channel: <outbound-channel-name>
        # errorHandling:            # Phase 6 — per-step overrides
        #   onError: fallback       # continue | dlq | fallback | fail
        #   fallback: <stepId>      # must resolve in the same flow
        #   retryableErrors: [TransientHttpError]
        #   nonRetryableErrors: [ValidationError]

errorHandling:
  retry:
    policy: exponential
    count: 4
    interval: PT5S
  dlq:
    channel: <dlq-channel-name>
  circuitBreaker:
    failureRatio: 0.5
    windowSeconds: 60

identity:
  managedIdentity: system
  roleAssignments:
    - scope: <resource>
      role: <least-privilege-role>

nonFunctionals:
  rps: 10
  p95LatencyMs: 2000
  slo:
    availability: 99.9
    errorBudgetDays: 30

dependencies: []

