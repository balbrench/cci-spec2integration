version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/tools/vscode-extension"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "nuget"
    directory: "/src/pipeline/FlowTester"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore"
      include: "scope"
